name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - 'ai/**'
      - 'fix/**'
      - 'test/**'

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: Agent guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Classify changed files
        env:
          AGENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          AGENT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npm run agent:guardrails

  fast-quality:
    name: Fast quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test:run

      - name: Production build
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify Java runtime
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          which java

      - name: Install dependencies
        run: npm ci

      - name: Verify Firebase CLI
        run: npm run firebase:version

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E with Firebase Emulator
        env:
          DEBUG: pw:webserver
          FIREBASE_CLI_SKIP_UPDATE_CHECK: 'true'
          NO_UPDATE_NOTIFIER: '1'
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
